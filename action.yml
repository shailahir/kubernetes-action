  name: 'shailahir/kubernetes-action'

  description: 'Kubernetes deployment GitHub Action'

  inputs:

    kubeConfig:
      description: 'KubeConfig content for connecting to Kubernetes cluster'
      required: true

    deployments:
      description: 'List of Kubernetes manifest files separated by deploymentsDelimiter'
      required: false

    deploymentsDelimiter:
      description: 'Delimiter used for parsing deployments and rolloutDeployments'
      required: false
      default: ','

    namespace:
      description: 'Kubernetes namespace'
      required: false
      default: 'default'

    rolloutDeployments:
      description: 'Deployment names to rollout restart after apply'
      required: false

    rolloutTimeout:
      description: 'Rollout status timeout'
      required: false
      default: '300s'

    dryRun:
      description: 'Run kubectl apply using dry-run=client'
      required: false
      default: 'false'

    showPods:
      description: 'Show pods after deployment'
      required: false
      default: 'true'

  outputs:

    time:
      description: 'Execution completion time'

  runs:
    using: 'docker'
    image: 'Dockerfile'

  branding:
    icon: 'arrow-right'
    color: 'blue'

